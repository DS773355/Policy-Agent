version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: policy-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: policy_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d policy_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5
    container_name: policy-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/neo4j_password
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p neo4j_password 'RETURN 1'"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: policy-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  vllm:
    image: vllm/vllm-openai:latest
    container_name: policy-vllm
    ports:
      - "8000:8000"
    environment:
      - HF_HOME=/root/.cache/huggingface
    volumes:
      - vllm_cache:/root/.cache/huggingface
    entrypoint: python3 -m vllm.entrypoints.openai.api_server
    command: >
      --model Qwen/Qwen2.5-32B-Instruct
      --host 0.0.0.0
      --port 8000
      --trust-remote-code
      --max-model-len 2048
    # GPU support (optional, standard configuration)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Keep container running even if GPU reservation fails, or let user edit it
    restart: on-failure

volumes:
  postgres_data:
  neo4j_data:
  redis_data:
  vllm_cache:
